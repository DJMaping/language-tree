<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Andah Language Tree</title>
    <script>
        // Pre-paint theme (same mechanism + localStorage key as the Andah Games site).
        (function () {
            try {
                var t = localStorage.getItem('andah-theme');
                if (t !== 'light' && t !== 'dark') {
                    t = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
                }
                document.documentElement.setAttribute('data-theme', t);
            } catch (e) { /* default light */ }
        })();
    </script>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="assets/icon.ico">
</head>
<body>
    <header class="topbar">
        <span class="brand">Andah Language Tree</span>
        <span class="doc-title" id="doc-title"></span>
        <div class="toolbar">
            <button class="btn btn-icon" id="btn-undo" title="Undo (Ctrl+Z)" aria-label="Undo">↶</button>
            <button class="btn btn-icon" id="btn-redo" title="Redo (Ctrl+Y)" aria-label="Redo">↷</button>
            <button class="btn btn-icon" id="btn-zoom-out" title="Zoom out (−)" aria-label="Zoom out">−</button>
            <button class="btn btn-zoom-readout" id="btn-zoom-reset" title="Reset zoom to fit (0)" aria-label="Reset zoom">100%</button>
            <button class="btn btn-icon" id="btn-zoom-in" title="Zoom in (+)" aria-label="Zoom in">+</button>
            <button class="btn" id="btn-fit" title="Fit the whole tree in view">Fit view</button>
            <button class="btn" id="btn-layout" title="Switch to tree view" aria-pressed="false" aria-label="Toggle tree view">🌳 Tree</button>
            <button class="btn" id="btn-minimap" title="Toggle the minimap overview" aria-pressed="false">Minimap</button>
            <button class="btn" id="btn-search" title="Find a language (Ctrl+K)">Search</button>
            <button class="btn" id="btn-scrub" title="Scrub through time — ghost languages not alive that year" aria-pressed="false">Scrub year</button>
            <button class="btn" id="btn-play" title="Play the timeline — sweep from the oldest year to now" aria-pressed="false">▶ Play</button>
            <button class="btn" id="btn-living" title="Dim every extinct language, showing only those alive today" aria-pressed="false">Living only</button>
            <button class="btn" id="btn-add-root" title="Start a new language family">+ Root language</button>
            <button class="btn" id="btn-borrow" title="Add a borrowing / influence arrow">+ Borrowing</button>
            <button class="btn" id="btn-export" title="Export the tree as an image">Export</button>
            <button class="btn" id="btn-settings">Settings</button>
            <button class="btn" id="btn-download" title="Download a copy of languages.json">Download backup</button>
            <button class="btn btn-icon" id="btn-help" title="Keyboard &amp; mouse reference (?)" aria-label="Help">?</button>
            <button class="btn" id="btn-theme">☾ Dark</button>
            <span id="status-chip"></span>
        </div>
    </header>

    <main class="app">
        <div id="viewport">
            <svg id="tree"></svg>
            <svg id="minimap" hidden aria-label="Tree overview minimap"></svg>
            <input id="inline-name" class="inline-name" hidden autocomplete="off" spellcheck="false"
                   placeholder="Language name…" maxlength="80">
            <div id="drag-readout" hidden></div>
            <div id="hover-tip" hidden></div>
            <div id="empty-hint" hidden></div>
            <div id="banner" hidden></div>
            <div id="search" hidden>
                <div class="search-box">
                    <input id="search-input" type="text" autocomplete="off" spellcheck="false"
                           placeholder="Find a language by name…">
                    <div id="search-results"></div>
                </div>
            </div>
        </div>
        <button id="panel-toggle" class="btn btn-icon" title="Hide panel" aria-label="Hide panel" aria-expanded="true">›</button>
        <aside id="panel"></aside>
    </main>

    <div id="ctxmenu" class="ctxmenu" hidden></div>
    <dialog id="dlg"></dialog>
    <div id="toasts"></div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
